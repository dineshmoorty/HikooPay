<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HikooPay — Login</title>
    <meta name="description" content="HikooPay — login to your account" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="styles/style.css" />
    <script defer src="scripts/app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { colors: { hikoo: "#6ee7b7" } } },
      };
    </script>
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <img src="assets/logo.svg" alt="HikooPay" class="logo" />
        <button
          id="themeToggle"
          aria-label="Toggle theme"
          class="ml-3 px-2 py-1 rounded-md text-sm bg-white/5 hover:bg-white/10 dark:bg-slate-800"
        >
          🌙
        </button>
        <button
          id="installBtn"
          aria-label="Install HikooPay"
          class="ml-2 px-2 py-1 rounded-md text-sm bg-hikoo text-slate-900 dark:bg-hikoo/90 hidden"
        >
          Install
        </button>
      </header>

      <section
        class="card glass register-card shadow-xl bg-gradient-to-tr from-white/5 to-white/2 dark:from-slate-900/60 dark:to-slate-900/40"
      >
        <h1>Sign in</h1>
        <p class="muted">Use your email or phone and password to sign in.</p>
        <form id="loginForm" class="form">
          <div class="field">
            <label for="loginId">Email or Phone</label>
            <input
              id="loginId"
              name="loginId"
              type="text"
              required
              placeholder="you@example.com or +91 98765 43210"
            />
          </div>
          <div class="field">
            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              name="password"
              type="password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn primary bg-hikoo text-slate-900 dark:bg-hikoo/90 dark:text-white"
          >
            Sign in
          </button>
        </form>
        <p class="foot muted">
          Don't have an account? <a href="index.html">Register</a>
        </p>
      </section>

      <footer class="site-footer muted">
        HikooPay • Secure payments • Offers & UPI
      </footer>
    </main>
  </body>
</html>
